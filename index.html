<!DOCTYPE html>
<html>
<head>
  <title>Image Load Event</title>
</head>

<body>

<img id="myImage" src="https://www.placecage.com/200/300" alt="Nicholas Cage">

<script>
function loaded(){
  console.log("img loaded");
}

let img = document.querySelector("#myImage");
img.addEventListener("load", loaded);
</script>

</body>
</html>
