<!DOCTYPE html>
<html>
  <head>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <title>Ajax Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  </head>

  <body>
    <nav>
        <div class="nav-wrapper teal" style="padding-left: 10px;">
           <a href="#!" class="brand-logo">Ajax Demo</a>
        </div>
    </nav>

    <main class="row" style="padding: 40px">
         <table class="striped">
           <thead>
                <tr>
                   <th>#</th>
                   <th>Name</th>
                   <th>Type</th>
                   <th>Website</th>
                </tr>
           </thead>
           <tbody id="result">
           </tbody>
         </table>
     </main>

     <script>
       // Function to render the table
       function drawTable(records) {
           const result = document.querySelector('#result');
           let html = '';

           for (let record of records) {
               html += `<tr>
                   <td>${record.id}</td>
                   <td>${record.name}</td>
                   <td>${record.brewery_type}</td>
                   <td><a href="${record.website_url}" target="_blank">${record.website_url}</a></td>
               </tr>`;
           }

           result.innerHTML = html;
       }

       // Async function to fetch data
       async function getData(url) {
           try {
               const response = await fetch(url);         // 1. Send HTTP request
               const result = await response.json();      // 2. Convert response to JSON
               drawTable(result);                          // 3. Pass data to drawTable
           } catch(e) {
               console.log("Error fetching data:", e);   // Catch and log any errors
           }
       }

       // Call getData with the API URL
       getData("https://api.openbrewerydb.org/breweries/search?query=harry");
     </script>
  </body>
</html>
