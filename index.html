<!DOCTYPE html>
<html>
  <head>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <title>Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  </head>

  <body>
    <nav>
        <div class="nav-wrapper teal" style="padding-left: 10px;">
           <a href="#!" class="brand-logo">Ajax Demo</a>
        </div>
    </nav>

    <main class="row" style="padding: 40px">
         <table class="striped">
           <thead>
                <tr>
                   <th>#</th>
                   <th>Name</th>
                   <th>Type</th>
                   <th>Website</th>
                </tr>
           </thead>
           <tbody id="result">
           </tbody>
         </table>
     </main>

     <script>
       function drawTable(records) {
           const result = document.querySelector('#result');
           let html = '';

           for (let record of records) {
               html += `<tr>
                   <td>${record.id}</td>
                   <td>${record.name}</td>
                   <td>${record.brewery_type}</td>
                   <td><a href="${record.website_url}" target="_blank">${record.website_url}</a></td>
               </tr>`;
           }

           result.innerHTML = html;
       }

       // Test the function with sample data
       drawTable([{
          id: 1,
          name: "bob's",
          brewery_type: "fire",
          website_url: "https://bobs.com"
       }]);
     </script>
  </body>
</html>
